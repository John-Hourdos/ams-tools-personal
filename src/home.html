<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trajectory Tools - Home</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            color: #333;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin: 0;
            color: #2c3e50;
            font-weight: 300;
        }

        .header p {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-top: 10px;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .action-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .action-card h3 {
            margin: 0 0 15px 0;
            color: #2c3e50;
            font-size: 1.3em;
        }

        .action-card p {
            margin: 0;
            color: #7f8c8d;
            line-height: 1.5;
        }

        .action-card .icon {
            display: inline;
            font-size: 2em;
            margin-right: 15px;
            color: #667eea;
        }

        .recent-files {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .recent-files h3 {
            margin: 0 0 20px 0;
            color: #2c3e50;
            font-size: 1.3em;
        }

        .recent-files ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .recent-files li {
            margin: 10px 0;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .recent-files li:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .recent-files a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: block;
            pointer-events: none;
        }

        .recent-files a:hover {
            color: #764ba2;
        }

        .recent-files .file-path {
            font-size: 0.9em;
            color: #6c757d;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script>
        var bridge;

        // Initialize the web channel when the page loads
        document.addEventListener('DOMContentLoaded', function() {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                bridge = channel.objects.bridge;
            });
        });

        function openFile() {
            if (bridge) {
                bridge.openFile();
            }
        }

        function importFile() {
            if (bridge) {
                bridge.importFile();
            }
        }

        function openRecentFile(filePath) {
            if (bridge) {
                bridge.openRecentFile(filePath);
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="actions">
            <div class="action-card" onclick="openFile()">
                <h3>&#128194; Open Trajectories</h3>
                <p>Open previously imported trajectory data</p>
            </div>

            <div class="action-card" onclick="importFile()">
                <h3>&#128229; Import Data</h3>
                <p>Import trajectory data. Supported file formats: CSV</p>
            </div>
        </div>

        <div class="recent-files">
            <h3>&#128200; Recent Trajectories</h3>
            <div id="recent-files-content">
                {{RECENT_FILES}}
            </div>
        </div>
    </div>
</body>
</html>
